name: Deploy to Cloud Run

on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_ID: rollingblackoutapp
  REGION: us-central1
  SERVICE: band-portal
  IMAGE: gcr.io/rollingblackoutapp/band-portal

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push image
        run: |
          TAG="${GITHUB_REF_NAME}"
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          TAG="${GITHUB_REF_NAME}"
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE:$TAG" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --service-account "band-portal@$PROJECT_ID.iam.gserviceaccount.com" \
            --no-allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "FIRESTORE_PROJECT_ID=rollingblackoutapp,FIRESTORE_DATABASE_ID=rollingblackoutapp-fsdb,GCS_BUCKET=rollingblackoutband,GCS_PREFIX=2026/"

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format "value(status.url)"
