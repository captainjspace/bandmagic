name: 'Build and Deploy to Cloud Run'

on:
  push:
    branches:
      - 'main' # Fixed: Removed the nested double quotes

env:
  PROJECT_ID: 'rollingblackoutapp'
  REGION: 'us-central1'
  # Ensure this matches your EXACT WIF provider string
  WORKLOAD_IDENTITY_PROVIDER: 'projects/901961412597/locations/global/workloadIdentityPools/githubpool/providers/github'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  deploy:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v2'

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          project_id: '${{ env.PROJECT_ID }}'
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'

      - name: 'Docker Auth'
        run: |-
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: 'Build and Push Container'
        run: |-
          # Added '/app' between the service (repo) and the tag
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/app:${{ github.sha }}"
          docker build --tag "${DOCKER_TAG}" .
          docker push "${DOCKER_TAG}"

      - name: 'Deploy to Cloud Run'
        id: 'deploy'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/app:${{ github.sha }}'

      - name: 'Show output'
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
