apiVersion: apps/v1
kind: Deployment
metadata:
  name: band-magic
  labels:
    app: band-magic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: band-magic
  template:
    metadata:
      labels:
        app: band-magic
    spec:
      containers:
        - name: band-magic
          imagePullPolicy: Never
          image: band-magic:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
