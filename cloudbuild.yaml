steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/rollingblackoutapp/band-portal/app:$SHORT_SHA'
      - '.'

  # 2. Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/rollingblackoutapp/band-portal/app:$SHORT_SHA'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/://google.com'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'band-portal'
      - '--image=us-central1-docker.pkg.dev/rollingblackoutapp/band-portal/app:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      # Enforce zero public access (No Cloud Run Invoker role granted to allUsers)
      - '--no-allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
